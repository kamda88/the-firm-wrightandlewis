<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Services | Wright & Lewis, LLP</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Georgia, serif;
    background:#fafafa;
    color:#2c2c2c;
}

/* HEADER */
.header {
    text-align:center;
    padding:50px 20px;
    border-bottom:3px solid #1a3a5c;
}

.header h1 {
    color:#1a3a5c;
}

/* NAV */
.nav {
    text-align:center;
    padding:15px;
}
.nav a {
    margin:0 15px;
    text-decoration:none;
    color:#1a3a5c;
    font-size:12px;
    letter-spacing:2px;
}
.nav a:hover { color:#c9a84c; }

/* CONTAINER */
.container {
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

/* FORM */
.form-box {
    background:#fff;
    padding:30px;
    border-left:4px solid #c9a84c;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.form-box h2 {
    margin-bottom:20px;
    color:#1a3a5c;
}

/* INPUTS */
.input-group {
    margin-bottom:20px;
}

.input-group label {
    display:block;
    font-size:13px;
    margin-bottom:5px;
}

.input-group input,
.input-group textarea,
.input-group select {
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    font-family:inherit;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.full {
    grid-column: span 2;
}

/* BUTTON */
button {
    background:#1a3a5c;
    color:#fff;
    padding:12px;
    border:none;
    cursor:pointer;
    width:100%;
    font-size:14px;
}
button:hover {
    background:#c9a84c;
}

/* INFO BOX */
.info {
    background:#f4f6f9;
    padding:20px;
    margin-bottom:30px;
    border-left:3px solid #1a3a5c;
    font-size:13px;
}

/* FOOTER */
.footer {
    text-align:center;
    font-size:11px;
    padding:20px;
    color:#999;
}
</style>

</head>

<body>

<div class="header">
    <h1>Escrow Services</h1>
    <p>Secure Crypto Transaction Management</p>
</div>

<div class="nav">
    <a href="index.html">Home</a>
    <a href="#">Practice Areas</a>
    <a href="#">Our Team</a>
    <a href="#">Contact</a>
</div>

<div class="container">

<div class="info">
<strong>How it works:</strong><br>
Funds are deposited into a controlled escrow wallet. Release occurs only upon mutual agreement or predefined conditions.
</div>

<div class="form-box">
<h2>Create Escrow Agreement</h2>

<form>

<div class="grid">

<div class="input-group">
<label>Your Full Name</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Your Email</label>
<input type="email" required>
</div>

<div class="input-group">
<label>Counterparty Name</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Counterparty Email</label>
<input type="email" required>
</div>

<div class="input-group">
<label>Crypto Type</label>
<select>
<option>Bitcoin (BTC)</option>
<option>Ethereum (ETH)</option>
<option>USDT</option>
</select>
</div>

<div class="input-group">
<label>Amount to Hold</label>
<input type="number" placeholder="e.g. 1.5" required>
</div>

<div class="input-group full">
<label>Depositor Wallet Address</label>
<input type="text" placeholder="Enter wallet address" required>
</div>

<div class="input-group full">
<label>Escrow Release Conditions</label>
<textarea rows="4" placeholder="Define when funds should be released..." required></textarea>
</div>

<div class="input-group full">
<label>Terms of Engagement</label>
<textarea rows="5" placeholder="Legal terms, dispute resolution, obligations..." required></textarea>
</div>

<div class="input-group">
<label>Transaction Reference ID</label>
<input type="text" placeholder="Optional tracking ID">
</div>

<div class="input-group">
<label>Escrow Duration</label>
<input type="text" placeholder="e.g. 7 days / milestone based">
</div>

<div class="input-group full">
<label>Additional Notes</label>
<textarea rows="3"></textarea>
</div>

</div>

<button type="submit">Initiate Escrow</button>

</form>
</div>

</div>

<div class="footer">
© Wright & Lewis, LLP · Escrow Division
</div>

</body>
</html>
