<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escrow Services | Wright & Lewis, LLP</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: Georgia, serif;
    background:#fafafa;
    color:#2c2c2c;
}

.header {
    text-align:center;
    padding:50px 20px;
    border-bottom:3px solid #1a3a5c;
}

.nav { text-align:center; padding:15px; }
.nav a {
    margin:0 15px;
    text-decoration:none;
    color:#1a3a5c;
    font-size:12px;
}
.nav a:hover { color:#c9a84c; }

.container {
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

.form-box {
    background:#fff;
    padding:30px;
    border-left:4px solid #c9a84c;
}

.input-group { margin-bottom:20px; }

.input-group label {
    display:block;
    font-size:13px;
    margin-bottom:5px;
}

input, textarea, select {
    width:100%;
    padding:10px;
    border:1px solid #ccc;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.full { grid-column: span 2; }

button {
    background:#1a3a5c;
    color:#fff;
    padding:12px;
    border:none;
    cursor:pointer;
    width:100%;
}

button:hover { background:#c9a84c; }

.wallet-box {
    background:#f4f6f9;
    padding:15px;
    border-left:3px solid #1a3a5c;
    font-size:13px;
}

.footer {
    text-align:center;
    font-size:11px;
    padding:20px;
    color:#999;
}
</style>
</head>

<body>

<div class="header">
    <h1>Escrow Services</h1>
</div>

<div class="nav">
    <a href="index.html">Home</a>
</div>

<div class="container">

<div class="form-box">
<h2>Create Escrow Agreement</h2>

<form id="escrowForm">

<div class="grid">

<div class="input-group">
<label>Your Name</label>
<input type="text" name="name" required>
</div>

<div class="input-group">
<label>Your Email</label>
<input type="email" name="email" required>
</div>

<div class="input-group">
<label>Counterparty Name</label>
<input type="text" name="counterparty" required>
</div>

<div class="input-group">
<label>Counterparty Email</label>
<input type="email" name="counterparty_email" required>
</div>

<div class="input-group">
<label>Crypto Type</label>
<select id="cryptoSelect" name="crypto">
<option value="btc">Bitcoin (BTC)</option>
<option value="eth">Ethereum (ETH)</option>
<option value="usdt">USDT</option>
</select>
</div>

<div class="input-group">
<label>Amount</label>
<input type="number" name="amount" required>
</div>

<!-- WALLET DISPLAY -->
<div class="input-group full">
<label>Escrow Wallet</label>
<div class="wallet-box" id="walletDisplay">
Send your crypto amount to this escrow wallet: a1ec8d4...
</div>
</div>

<div class="input-group full">
<label>Depositor Wallet Address</label>
<input type="text" name="depositor_wallet" required>
</div>

<div class="input-group full">
<label>Release Conditions</label>
<textarea name="conditions" required></textarea>
</div>

<div class="input-group full">
<label>Terms</label>
<textarea name="terms" required></textarea>
</div>

</div>

<button type="submit">Initiate Escrow</button>

</form>
</div>

</div>

<div class="footer">
© Wright & Lewis, LLP
</div>

<script>
// WALLET MAPPING
const wallets = {
    btc: "a1ec8d4BTCxxxxxxx",
    eth: "0xA1ec8d4ETHxxxxxxx",
    usdt: "TXA1ec8d4USDTxxxx"
};

// UPDATE DISPLAY
const select = document.getElementById("cryptoSelect");
const display = document.getElementById("walletDisplay");

function updateWallet() {
    const selected = select.value;
    const wallet = wallets[selected];

    display.innerHTML = 
    "Send your crypto amount to this escrow wallet: <strong>" + wallet + "</strong>";
}

select.addEventListener("change", updateWallet);
updateWallet();


// FORM SUBMISSION
document.getElementById("escrowForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = Object.fromEntries(new FormData(this));

    try {
        const response = await fetch("https://your-backend-endpoint.com/escrow", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(formData)
        });

        if (response.ok) {
            alert("Escrow request submitted successfully.");
            this.reset();
            updateWallet();
        } else {
            alert("Submission failed.");
        }

    } catch (error) {
        alert("Error submitting form.");
    }
});
</script>

</body>
</html>
